security:
    # 1. Algorithme dial hachage dial l-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Fin ghadi y-9leb ela l-User f l-DB
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # 3. Endpoint dial l-Login (Fin gha t-akhd token)
        login:
            pattern: ^/api/login_check
            stateless: true
            json_login:
                check_path: /api/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # 4. Protection dial l-API kamla
        api:
            pattern: ^/api
            stateless: true
            jwt: true

    # 5. L-permissions dial les routes
    access_control:
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS } # L-login accessible l-kolshi
        - { path: ^/api$, roles: PUBLIC_ACCESS }             # Swagger UI mftoha
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }    # L-bâqi kamel khasso Token